function simulateScan() {
  const unchecked = MOCK_ATTENDEES.filter(a => !a.checkedIn);
  const checked = MOCK_ATTENDEES.filter(a => a.checkedIn);
  const roll = Math.random();

  if (roll < 0.5 && unchecked.length > 0) {
    // Valid scan - check in a random unchecked attendee
    const att = unchecked[Math.floor(Math.random() * unchecked.length)];
    const idx = MOCK_ATTENDEES.indexOf(att);
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    MOCK_ATTENDEES[idx].checkedIn = true;
    MOCK_ATTENDEES[idx].checkedInAt = timeStr;
    MOCK_ATTENDEES[idx].checkedInBy = 'scan';
    checkinHistory.push({ name: att.name, tier: att.tier, time: timeStr, method: 'scan' });
    state.scanResult = { type: 'valid', title: 'Valid Ticket', message: att.name, tier: att.tier };
  } else if (roll < 0.75 && checked.length > 0) {
    // Already used
    const att = checked[Math.floor(Math.random() * checked.length)];
    state.scanResult = { type: 'already', title: 'Already Checked In', message: `${att.name} was checked in at ${att.checkedInAt}`, tier: att.tier };
  } else {
    // Invalid
    state.scanResult = { type: 'invalid', title: 'Invalid Ticket', message: 'This ticket was not found in the system.' };
  }
  render();
}

function toggleCheckin(index) {
  const att = MOCK_ATTENDEES[index];
  att.checkedIn = !att.checkedIn;
  if (att.checkedIn) {
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    att.checkedInAt = timeStr;
    att.checkedInBy = 'manual';
    checkinHistory.push({ name: att.name, tier: att.tier, time: timeStr, method: 'manual' });
  } else {
    att.checkedInAt = null;
    att.checkedInBy = null;
  }
  render();
}

function toggleCheckinSelect(index) {
  if (state.checkinSelected.has(index)) {
    state.checkinSelected.delete(index);
  } else {
    state.checkinSelected.add(index);
  }
  render();
}

function bulkCheckin() {
  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  state.checkinSelected.forEach(idx => {
    if (!MOCK_ATTENDEES[idx].checkedIn) {
      MOCK_ATTENDEES[idx].checkedIn = true;
      MOCK_ATTENDEES[idx].checkedInAt = timeStr;
      MOCK_ATTENDEES[idx].checkedInBy = 'manual';
      checkinHistory.push({ name: MOCK_ATTENDEES[idx].name, tier: MOCK_ATTENDEES[idx].tier, time: timeStr, method: 'manual' });
    }
  });
  state.checkinSelected = new Set();
  render();
}

function filterAttendees(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('.attendee-item').forEach(item => {
    const name = item.getAttribute('data-name') || '';
    const email = item.getAttribute('data-email') || '';
    const code = item.getAttribute('data-code') || '';
    item.style.display = (name.includes(q) || email.includes(q) || code.includes(q)) ? 'flex' : 'none';

function searchVenues(query) {
  const q = query.toLowerCase();
  const cards = document.querySelectorAll('.venue-card');
  cards.forEach((card, i) => {
    const venue = MOCK.venues[i];
    if (!venue) return;
    const match = venue.name.toLowerCase().includes(q) || venue.type.toLowerCase().includes(q) || venue.address.toLowerCase().includes(q);
    card.style.display = match ? 'block' : 'none';
  });
}

let artistGenreFilter = 'All';

function renderArtistMarketplace() {
  const genres = ['All', 'R&B / Soul', 'EDM / Hip Hop', 'Stand-Up', 'Jazz / Neo-Soul', 'Live Art', 'Hip Hop'];

  return `
    ${renderTopBar('Artists', true)}
    <div class="page">
      <div class="search-input-wrap" style="margin: 12px 16px;">
        ${ICONS.search}
        <input type="text" class="search-input" placeholder="Search artists..." oninput="searchArtists(this.value)">
      </div>
      <div class="filter-row">
        ${genres.map(g => `
          <button class="filter-chip ${artistGenreFilter === g ? 'active' : ''}" onclick="artistGenreFilter='${g}'; render();">${g === 'All' ? 'All' : g.split(' / ')[0]}</button>

      <div class="artist-grid" id="artistList">
        ${filtered.map(renderArtistCard).join('')}
      </div>

function renderArtistCard(artist) {
  return `
    <div class="artist-card" onclick="navigate('artist-profile', { id: '${artist.id}' })">
      <div class="artist-card-avatar" style="background: ${EVENT_GRADIENTS[artist.gradient || artist.avatar]};">
        <span class="artist-card-genre">${artist.genre.split(' / ')[0]}</span>
      </div>
      <div class="artist-card-body">
        <h3 class="artist-card-name">${artist.name}</h3>
        <p class="artist-card-type">${artist.type}</p>
        <div class="artist-card-footer">
          <span class="artist-card-rate">$${artist.hourlyRate}/hr</span>
          <span class="artist-card-rating">
            <svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            ${artist.rating}
          </span>
        </div>
      </div>
    </div>
  `;
}

function searchArtists(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('.artist-card').forEach((card, i) => {
    const artist = MOCK.artists[i];
    if (!artist) return;
    const match = artist.name.toLowerCase().includes(q) || artist.type.toLowerCase().includes(q) || artist.genre.toLowerCase().includes(q);
    card.style.display = match ? 'block' : 'none';
  });
}

function renderBookingDetail() {

  const statusColors = { pending: 'var(--orange)', accepted: 'var(--teal)', declined: '#ef4444' };
  const statusLabels = { pending: 'Awaiting Response', accepted: 'Confirmed', declined: 'Declined' };

  return `
    ${renderTopBar('Booking Details', true)}
    <div class="page booking-detail">
      <div class="booking-status-banner ${booking.status}">
        <div class="booking-status-label">${statusLabels[booking.status]}</div>
        <div class="booking-status-text">${booking.type === 'venue' ? 'Venue' : 'Artist'} booking for ${booking.eventName}</div>
      </div>

      <div class="booking-section">
        <div class="booking-section-title">${booking.type === 'venue' ? 'Venue' : 'Artist'}</div>
        <div class="booking-provider-card" onclick="navigate('${booking.type === 'venue' ? 'venue-detail' : 'artist-profile'}', { id: '${booking.providerId}' })">
          <div class="booking-provider-avatar" style="${getAvatar(booking.type === 'venue' ? 2 : 0)}"></div>
          <div class="booking-provider-info">
            <h4>${booking.providerName}</h4>
            <p>${booking.providerType === 'venue' ? 'Event Venue' : 'Performer'}</p>
          </div>
          <span style="color: var(--text-secondary);">${ICONS.chevron}</span>
        </div>
      </div>

      <div class="booking-section">
        <div class="booking-section-title">Booking Details</div>
        <div class="booking-info-row">
          <span class="booking-info-label">Event</span>
          <span class="booking-info-value">${booking.eventName}</span>
        </div>
        <div class="booking-info-row">
          <span class="booking-info-label">Date</span>
          <span class="booking-info-value">${formatDate(booking.date)}</span>
        </div>
        <div class="booking-info-row">
          <span class="booking-info-label">Duration</span>
          <span class="booking-info-value">${booking.hours} hours</span>
        </div>
        <div class="booking-info-row">
          <span class="booking-info-label">Type</span>
          <span class="booking-info-value">${booking.type === 'venue' ? 'Venue Rental' : 'Artist Performance'}</span>
        </div>
        <div class="booking-total-row">
          <span class="booking-info-label">Total Amount</span>
          <span class="booking-info-value">$${booking.amount.toLocaleString()}</span>
        </div>
      </div>

      <div class="booking-section">
        <div class="booking-section-title">Timeline</div>
        <div class="booking-timeline">
          ${booking.timeline.map(t => `
            <div class="timeline-item">
              <div class="timeline-dot ${t.active ? (t.label.includes('Declined') ? 'orange' : 'active') : ''}"></div>
              <div class="timeline-label">${t.label}</div>
              ${t.date ? `<div class="timeline-date">${t.date}</div>` : ''}
            </div>
          `).join('')}
        </div>
      </div>

      <div style="display: flex; gap: 8px;">
        <button class="btn btn-primary btn-full" onclick="navigate('chat', { id: '${MOCK_CONVERSATIONS.find(c => c.bookingId === booking.id)?.id || 'c1'}' })">

  `;
}

}

function advanceStripeStep() {
  if (stripeStep < 2) {
    stripeStep++;
    render();
  } else {
    state.user.stripeConnected = true;
    stripeStep = 0;
    saveState();
    // If onboarding not complete, go there next
    if (!state.user.onboardingComplete) {
      navigate('onboarding');
    } else {
      render();
    }
  }
}

function renderCategoryDeepDive() {
  const category = state.routeParams.category || 'Music';
  const groupName = state.routeParams.name || category;
  const events = MOCK.events.filter(e => e.category === category);
  return `
    ${renderTopBar(groupName, true)}
    <div class="page" style="padding-bottom: 100px;">
      <div style="height: 120px; background: ${EVENT_GRADIENTS[0]}; display: flex; align-items: flex-end; padding: 16px; position: relative;">
        <div style="position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);"></div>
        <div style="position: relative; z-index: 1;">
          <h2 style="font-family: var(--font-display); font-weight: 700; font-size: 24px;">${groupName}</h2>
          <p style="font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 2px;">${events.length} events in ${category}</p>
        </div>
      </div>
      <div class="event-feed">
        ${events.length > 0 ? events.map(renderEventCard).join('') : '<p style="color: var(--text-secondary); text-align: center; padding: 40px 0;">No events in this category yet</p>'}
      </div>
    </div>
    ${renderBottomNav('home')}
  `;
}
function renderFollowedArtistItem(a) {
  return '<div style="display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 8px; cursor: pointer;" onclick="navigate(\'artist-profile\', { id: \'' + a.id + '\' })">' +
    '<div class="attendee-avatar" style="' + getAvatar(a.avatar) + '"></div>' +
    '<div style="flex: 1;"><div style="font-weight: 600; font-size: 14px;">' + a.name + '</div><div style="font-size: 12px; color: var(--text-secondary);">' + a.type + ' &middot; ' + a.genre + '</div></div>' +
    '<button class="btn btn-sm" style="background: var(--teal); font-size: 11px;" onclick="event.stopPropagation(); toggleFollowArtist(\'' + a.id + '\')">Following</button></div>';
}

function renderFollowedVenueItem(v) {
  return '<div style="display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 8px; cursor: pointer;" onclick="navigate(\'venue-detail\', { id: \'' + v.id + '\' })">' +
    '<div style="width: 44px; height: 44px; border-radius: var(--radius-sm); background: ' + EVENT_GRADIENTS[v.gradient] + '; flex-shrink: 0;"></div>' +
    '<div style="flex: 1;"><div style="font-weight: 600; font-size: 14px;">' + v.name + '</div><div style="font-size: 12px; color: var(--text-secondary);">' + v.type + ' &middot; ' + v.address + '</div></div>' +
    '<button class="btn btn-sm" style="background: var(--teal); font-size: 11px;" onclick="event.stopPropagation(); toggleFollowVenue(\'' + v.id + '\')">Following</button></div>';
}

function renderFollowing() {
  const followTab = state.followingTab || 'artists';
  const followedArtistsList = MOCK.artists.filter(a => state.followedArtists.has(a.id));
  const followedVenuesList = MOCK.venues.filter(v => state.followedVenues.has(v.id));

  let listContent = '';
  if (followTab === 'artists') {
    listContent = followedArtistsList.length === 0
      ? '<p style="color: var(--text-secondary); text-align: center; padding: 40px 0;">No artists followed yet</p>'
      : followedArtistsList.map(renderFollowedArtistItem).join('');
  } else {
    listContent = followedVenuesList.length === 0
      ? '<p style="color: var(--text-secondary); text-align: center; padding: 40px 0;">No venues followed yet</p>'
      : followedVenuesList.map(renderFollowedVenueItem).join('');
  }

  return `
    ${renderTopBar('Following', true)}
    <div class="page" style="padding-bottom: 100px;">
      <div class="checkin-tabs" style="padding: 0 16px;">
        <button class="checkin-tab ${followTab === 'artists' ? 'active' : ''}" onclick="state.followingTab='artists'; render();">Artists (${followedArtistsList.length})</button>
        <button class="checkin-tab ${followTab === 'venues' ? 'active' : ''}" onclick="state.followingTab='venues'; render();">Venues (${followedVenuesList.length})</button>
      </div>
      <div style="padding: 12px 16px;">
        ${listContent}
      </div>
    </div>
    ${renderBottomNav('profile')}
  `;
}
function renderTipItem(tip) {
  const d = new Date(tip.timestamp);
  const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  const timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  return '<div style="display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 8px;">' +
    '<div style="width: 40px; height: 40px; border-radius: 50%; background: rgba(255,107,53,0.15); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">' +
    '<svg viewBox="0 0 24 24" fill="none" stroke="var(--orange)" stroke-width="2" width="18" height="18"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>' +
    '<div style="flex: 1;"><div style="font-weight: 600; font-size: 14px;">' + tip.artistName + '</div>' +
    '<div style="font-size: 11px; color: var(--text-secondary);">' + dateStr + ' at ' + timeStr + ' &middot; ' + tip.context + '</div></div>' +
    '<span style="font-weight: 700; font-size: 16px; color: var(--orange);">$' + tip.amount + '</span></div>';
}

function renderTipHistoryPage() {
  const tips = state.tipHistory || [];
  const tipsList = tips.length === 0
    ? '<p style="color: var(--text-secondary); text-align: center; padding: 40px 0;">No tips sent yet</p>'
    : tips.slice().reverse().map(renderTipItem).join('');

  return `
    ${renderTopBar('Tip History', true)}
    <div class="page" style="padding-bottom: 100px;">
      <div style="padding: 16px;">
        ${tipsList}
      </div>
    </div>
    ${renderBottomNav('profile')}
  `;
}
function renderBookingRequest() {
  const providerType = state.routeParams.type || 'venue';
  const providerId = state.routeParams.id;
  const provider = providerType === 'venue'
    ? MOCK.venues.find(v => v.id === providerId)
    : MOCK.artists.find(a => a.id === providerId);
  if (!provider) return renderHome();

  const pricingMode = provider.pricingMode || 'set';
  const bookedDays = [3, 7, 12, 15, 21, 25];
  const today = new Date();
  const month = today.getMonth();
  const year = today.getFullYear();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const monthName = today.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  let calCells = '';
  for (let i = 0; i < firstDay; i++) calCells += '<div class="venue-cal-cell empty"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const isBooked = bookedDays.includes(d);
    const isSelected = state.selectedBookingDate === d;
    if (isBooked) {
      calCells += '<div class="venue-cal-cell booked" style="opacity: 0.4; cursor: not-allowed;">' + d + '</div>';
    } else {
      calCells += '<div class="venue-cal-cell available' + (isSelected ? ' selected' : '') + '" style="' + (isSelected ? 'background: var(--teal); color: white; font-weight: 700;' : '') + '" onclick="state.selectedBookingDate=' + d + '; render();">' + d + '</div>';
    }
  }

  const hourlyRate = providerType === 'venue' ? provider.hourlyRate : provider.hourlyRate;
  const deposit = providerType === 'venue' ? provider.deposit : Math.round(hourlyRate * 0.5);
  const selectedHours = state.bookingHours || 4;
  const totalEstimate = hourlyRate * selectedHours;

  return `
    ${renderTopBar('Booking Request', true)}
    <div class="page" style="padding-bottom: 100px;">
      <div style="padding: 16px;">
        <div style="display: flex; gap: 12px; align-items: center; padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 16px;">
          ${providerType === 'venue'
            ? '<div style="width: 56px; height: 56px; border-radius: var(--radius-md); background: ' + EVENT_GRADIENTS[provider.gradient] + '; flex-shrink: 0;"></div>'
            : '<div class="attendee-avatar" style="' + getAvatar(provider.avatar) + '; width: 56px; height: 56px;"></div>'
          }
          <div>
            <div style="font-weight: 700; font-size: 16px;">${provider.name}</div>
            <div style="font-size: 12px; color: var(--text-secondary);">${providerType === 'venue' ? provider.type + ' &middot; ' + provider.capacity + ' capacity' : provider.type + ' &middot; ' + provider.genre}</div>
            <div style="font-size: 13px; color: var(--teal); font-weight: 600; margin-top: 2px;">$${hourlyRate}/hr ${pricingMode === 'negotiable' ? '<span style="color: var(--orange); font-size: 11px;">(Negotiable)</span>' : ''}</div>
          </div>
        </div>

        <h3 class="section-title" style="padding: 0;">Select Date</h3>
        <div class="venue-calendar" style="margin-bottom: 16px;">
          <div class="venue-cal-header">
            <h4>${monthName}</h4>
          </div>
          <div class="venue-cal-grid">
            ${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d => '<div class="venue-cal-day">' + d + '</div>').join('')}
            ${calCells}
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Duration (hours)</label>
          <div style="display: flex; align-items: center; gap: 12px;">
            <button class="btn btn-sm btn-outline" onclick="state.bookingHours = Math.max(1, (state.bookingHours || 4) - 1); render();">-</button>
            <span style="font-family: var(--font-display); font-size: 22px; font-weight: 700; min-width: 40px; text-align: center;">${selectedHours}</span>
            <button class="btn btn-sm btn-outline" onclick="state.bookingHours = Math.min(12, (state.bookingHours || 4) + 1); render();">+</button>
            <span style="font-size: 13px; color: var(--text-secondary);">hours</span>
          </div>
        </div>

        ${pricingMode === 'negotiable' ? `
          <div class="form-group">
            <label class="form-label">Your Proposed Price</label>
            <div style="display: flex; align-items: center; gap: 8px;">
              <span style="font-size: 18px; font-weight: 700; color: var(--text-secondary);">$</span>
              <input type="number" class="form-input" style="margin: 0; flex: 1;" placeholder="${totalEstimate}" id="proposedPrice">
            </div>
            <p style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">Provider's rate: $${hourlyRate}/hr &middot; Suggested total: $${totalEstimate}</p>
          </div>
        ` : `
          <div style="padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 16px;">
            <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px;">
              <span style="color: var(--text-secondary);">$${hourlyRate}/hr x ${selectedHours} hours</span>
              <span style="font-weight: 600;">$${totalEstimate}</span>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 13px; border-top: 1px solid var(--border); padding-top: 6px;">
              <span style="color: var(--text-secondary);">Deposit required</span>
              <span style="font-weight: 600; color: var(--orange);">$${deposit}</span>
            </div>
          </div>
        `}

        ${providerType === 'venue' && provider.cancellationPolicy ? `
          <div style="padding: 10px 12px; background: rgba(255,107,53,0.06); border: 1px solid rgba(255,107,53,0.15); border-radius: var(--radius-md); margin-bottom: 16px;">
            <div style="font-size: 12px; font-weight: 600; color: var(--orange); margin-bottom: 2px;">Cancellation Policy</div>
            <div style="font-size: 11px; color: var(--text-secondary);">${provider.cancellationPolicy}</div>
          </div>
        ` : ''}

        <div style="display: flex; align-items: flex-start; gap: 8px; margin-bottom: 16px;">
          <div style="width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 4px; flex-shrink: 0; margin-top: 2px; cursor: pointer;" onclick="this.style.background = this.style.background ? '' : 'var(--teal)'; this.style.borderColor = this.style.borderColor === 'var(--teal)' ? 'var(--border)' : 'var(--teal)';"></div>
          <span style="font-size: 12px; color: var(--text-secondary);">I agree to the booking terms, deposit requirements, and cancellation policy.</span>
        </div>

        <button class="btn btn-primary btn-full" onclick="alert('Booking request sent! You\\'ll be notified when the ${providerType === 'venue' ? 'venue owner' : 'artist'} responds.'); navigate('bookings');">
          Send Booking Request
        </button>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
loadState();
handleHash();
</script>
</body>
</html>
