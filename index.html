<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F0F13">
<title>PullUpp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════════ */
:root {
  --orange: #FF6B35;
  --orange-light: #FF8F5E;
  --orange-dark: #E55A28;
  --orange-glow: rgba(255, 107, 53, 0.35);
  --teal: #14B8A6;
  --teal-light: #2DD4BF;
  --teal-dark: #0D9488;
  --teal-glow: rgba(20, 184, 166, 0.25);
  --bg: #0F0F13;
  --bg-elevated: #16161D;
  --surface: #1A1A23;
  --surface-alt: #22222E;
  --surface-hover: #2A2A38;
  --border: #2D2D3A;
  --border-light: #3A3A4A;
  --text: #FFFFFF;
  --text-secondary: #9CA3AF;
  --text-muted: #6B7280;
  --success: #22C55E;
  --warning: #F59E0B;
  --error: #EF4444;
  --font-display: 'Syne', sans-serif;
  --font-body: 'Outfit', sans-serif;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-full: 9999px;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 20px var(--orange-glow);
  --nav-height: 64px;
  --top-bar-height: 56px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* ═══════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
a { color: inherit; text-decoration: none; }
button {
  font-family: var(--font-body);
  border: none;
  background: none;
  cursor: pointer;
  color: inherit;
  font-size: inherit;
}
input, textarea, select {
  font-family: var(--font-body);
  font-size: 16px;
  outline: none;
  border: none;
  background: none;
  color: var(--text);
}
img { max-width: 100%; display: block; }
::-webkit-scrollbar { width: 0; height: 0; }

/* ═══════════════════════════════════════════
   APP SHELL
   ═══════════════════════════════════════════ */
#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100dvh;
  position: relative;
  background: var(--bg);
}
@media (min-width: 1024px) {
  #app { max-width: 420px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
}

/* ═══════════════════════════════════════════
   TOP BAR
   ═══════════════════════════════════════════ */
.top-bar {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  height: var(--top-bar-height);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: rgba(15, 15, 19, 0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  z-index: 100;
  border-bottom: 1px solid rgba(45, 45, 58, 0.5);
}
@media (min-width: 1024px) { .top-bar { max-width: 420px; } }
.top-bar-logo {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 20px;
  letter-spacing: -0.5px;
}
.top-bar-logo span { color: var(--orange); }
.top-bar-actions { display: flex; gap: 8px; align-items: center; }
.top-bar-btn {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-full);
  background: var(--surface);
  position: relative;
  transition: background 0.2s;
}
.top-bar-btn:hover { background: var(--surface-alt); }
.top-bar-btn svg { width: 18px; height: 18px; }
.notif-badge {
  position: absolute; top: 2px; right: 2px;
  width: 8px; height: 8px;
  background: var(--orange);
  border-radius: var(--radius-full);
  border: 2px solid var(--bg);
}
.top-bar-back {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-full);
  background: var(--surface);
  transition: background 0.2s;
}
.top-bar-back:hover { background: var(--surface-alt); }
.top-bar-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 17px;
}

/* ═══════════════════════════════════════════
   BOTTOM NAV
   ═══════════════════════════════════════════ */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  height: calc(var(--nav-height) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  display: flex;
  align-items: center;
  justify-content: space-around;
  background: rgba(15, 15, 19, 0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid rgba(45, 45, 58, 0.5);
  z-index: 100;
}
@media (min-width: 1024px) { .bottom-nav { max-width: 420px; } }
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  border-radius: var(--radius-md);
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.nav-item svg { width: 22px; height: 22px; color: var(--text-muted); transition: color 0.2s; }
.nav-item span {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  transition: color 0.2s;
}
.nav-item.active svg { color: var(--orange); }
.nav-item.active span { color: var(--orange); }

/* ═══════════════════════════════════════════
   PAGE CONTAINER
   ═══════════════════════════════════════════ */
.page {
  padding-top: var(--top-bar-height);
  padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 16px);
  min-height: 100dvh;
  animation: pageIn 0.3s ease;
}
.page-full {
  min-height: 100dvh;
  animation: pageIn 0.3s ease;
}
@keyframes pageIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════
   SPLASH SCREEN
   ═══════════════════════════════════════════ */
.splash {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  position: relative;
  overflow: hidden;
}
.splash::before {
  content: '';
  position: absolute;
  top: -40%;
  left: -20%;
  width: 140%;
  height: 80%;
  background: radial-gradient(ellipse at center, var(--orange-glow) 0%, transparent 65%);
  animation: splashPulse 4s ease-in-out infinite;
}
.splash::after {
  content: '';
  position: absolute;
  bottom: -30%;
  right: -30%;
  width: 100%;
  height: 60%;
  background: radial-gradient(ellipse at center, var(--teal-glow) 0%, transparent 65%);
  animation: splashPulse 4s ease-in-out infinite 2s;
}
@keyframes splashPulse {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 0.8; transform: scale(1.05); }
}
.splash-content {
  position: relative;
  z-index: 1;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
.splash-logo {
  font-family: var(--font-display);
  font-size: 56px;
  font-weight: 800;
  letter-spacing: -2px;
  line-height: 1;
  margin-bottom: 8px;
}
.splash-logo span { color: var(--orange); }
.splash-tagline {
  font-size: 16px;
  color: var(--text-secondary);
  max-width: 280px;
  line-height: 1.5;
  margin-bottom: 24px;
}
.splash-icon {
  width: 80px;
  height: 80px;
  border-radius: var(--radius-xl);
  background: linear-gradient(135deg, var(--orange), var(--orange-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
  box-shadow: var(--shadow-glow);
}
.splash-icon svg { width: 40px; height: 40px; }

/* ═══════════════════════════════════════════
   BUTTONS
   ═══════════════════════════════════════════ */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 28px;
  border-radius: var(--radius-full);
  font-weight: 600;
  font-size: 15px;
  transition: all 0.25s;
  -webkit-tap-highlight-color: transparent;
}
.btn-primary {
  background: linear-gradient(135deg, var(--orange), var(--orange-dark));
  color: white;
  box-shadow: var(--shadow-glow);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 0 30px var(--orange-glow); }
.btn-primary:active { transform: scale(0.97); }
.btn-secondary {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
}
.btn-secondary:hover { background: var(--surface-alt); border-color: var(--border-light); }
.btn-teal {
  background: linear-gradient(135deg, var(--teal), var(--teal-dark));
  color: white;
}
.btn-outline {
  background: transparent;
  border: 1.5px solid var(--orange);
  color: var(--orange);
}
.btn-outline:hover { background: rgba(255, 107, 53, 0.1); }
.btn-full { width: 100%; }
.btn-sm { padding: 10px 20px; font-size: 13px; }
.btn-lg { padding: 16px 32px; font-size: 17px; }

/* ═══════════════════════════════════════════
   FORM ELEMENTS
   ═══════════════════════════════════════════ */
.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.form-input {
  width: 100%;
  padding: 14px 16px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  color: var(--text);
  font-size: 15px;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--orange); }
.form-input::placeholder { color: var(--text-muted); }

/* ═══════════════════════════════════════════
   AUTH SCREENS
   ═══════════════════════════════════════════ */
.auth-page {
  min-height: 100dvh;
  padding: 24px;
  display: flex;
  flex-direction: column;
}
.auth-header {
  margin-top: 48px;
  margin-bottom: 32px;
}
.auth-header h1 {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
}
.auth-header p { color: var(--text-secondary); font-size: 15px; }
.auth-form { flex: 1; }
.auth-footer {
  text-align: center;
  padding: 24px 0;
  color: var(--text-secondary);
  font-size: 14px;
}
.auth-footer a { color: var(--orange); font-weight: 600; }
.auth-back {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-full);
  background: var(--surface);
}
.auth-divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 24px 0;
  color: var(--text-muted);
  font-size: 13px;
}
.auth-divider::before, .auth-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Role Selection Cards */
.role-grid { display: flex; flex-direction: column; gap: 12px; margin: 16px 0; }
.role-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition: all 0.25s;
  -webkit-tap-highlight-color: transparent;
}
.role-card:hover { border-color: var(--border-light); background: var(--surface-alt); }
.role-card.selected { border-color: var(--orange); background: rgba(255, 107, 53, 0.08); }
.role-icon {
  width: 44px; height: 44px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.role-icon svg { width: 22px; height: 22px; }
.role-info h3 { font-family: var(--font-display); font-weight: 600; font-size: 15px; margin-bottom: 2px; }
.role-info p { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }

/* ═══════════════════════════════════════════
   FILTER CHIPS
   ═══════════════════════════════════════════ */
.filter-row {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.filter-chip {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: var(--radius-full);
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.filter-chip:hover { background: var(--surface-alt); }
.filter-chip.active {
  background: var(--orange);
  border-color: var(--orange);
  color: white;
}

/* ═══════════════════════════════════════════
   EVENT CARDS
   ═══════════════════════════════════════════ */
.event-feed { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 16px; }
.event-card {
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--surface);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.25s;
  -webkit-tap-highlight-color: transparent;
}
.event-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--border-light); }
.event-card:active { transform: scale(0.98); }
.event-card-img {
  height: 180px;
  position: relative;
  overflow: hidden;
}
.event-card-img::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60%;
  background: linear-gradient(to top, rgba(15,15,19,0.8), transparent);
}
.event-card-category {
  position: absolute;
  top: 12px; left: 12px;
  padding: 4px 10px;
  border-radius: var(--radius-full);
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  z-index: 1;
}
.event-card-save {
  position: absolute;
  top: 12px; right: 12px;
  width: 32px; height: 32px;
  border-radius: var(--radius-full);
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  z-index: 1;
  transition: all 0.2s;
}
.event-card-save:hover { background: rgba(0,0,0,0.6); }
.event-card-save.saved { background: var(--orange); }
.event-card-save svg { width: 16px; height: 16px; }
.event-card-date-badge {
  position: absolute;
  bottom: 12px; left: 12px;
  background: var(--orange);
  border-radius: var(--radius-sm);
  padding: 4px 8px;
  text-align: center;
  z-index: 1;
  line-height: 1;
}
.event-card-date-badge .month { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 1px; }
.event-card-date-badge .day { font-size: 16px; font-weight: 800; font-family: var(--font-display); display: block; }
.event-card-body { padding: 14px 14px 16px; }
.event-card-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 17px;
  margin-bottom: 6px;
  line-height: 1.2;
}
.event-card-meta {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.event-card-meta-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text-secondary);
}
.event-card-meta-item svg { width: 14px; height: 14px; flex-shrink: 0; color: var(--text-muted); }
.event-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.event-card-price { font-weight: 700; font-size: 15px; color: var(--orange); }
.event-card-price span { font-size: 12px; color: var(--text-muted); font-weight: 400; }
.event-card-attendees {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  color: var(--text-muted);
}
.avatar-stack { display: flex; }
.avatar-stack .avatar-tiny {
  width: 20px; height: 20px;
  border-radius: var(--radius-full);
  border: 2px solid var(--surface);
  margin-left: -6px;
}
.avatar-stack .avatar-tiny:first-child { margin-left: 0; }

/* ═══════════════════════════════════════════
   EVENT DETAIL
   ═══════════════════════════════════════════ */
.event-detail { padding-top: 0; }
.event-hero {
  height: 280px;
  position: relative;
  overflow: hidden;
}
.event-hero::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 50%;
  background: linear-gradient(to top, var(--bg), transparent);
}
.event-hero-actions {
  position: absolute;
  top: 12px; left: 12px; right: 12px;
  display: flex;
  justify-content: space-between;
  z-index: 2;
}
.event-hero-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius-full);
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.event-hero-btn:hover { background: rgba(0,0,0,0.6); }
.event-hero-btn svg { width: 18px; height: 18px; }
.event-detail-body { padding: 0 16px 120px; margin-top: -24px; position: relative; z-index: 1; }
.event-detail-header { margin-bottom: 20px; }
.event-detail-category {
  display: inline-block;
  padding: 4px 12px;
  border-radius: var(--radius-full);
  background: rgba(255, 107, 53, 0.15);
  color: var(--orange);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}
.event-detail-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 800;
  line-height: 1.15;
  letter-spacing: -0.5px;
  margin-bottom: 12px;
}
.event-detail-info {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.event-info-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.event-info-icon {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.event-info-icon svg { width: 16px; height: 16px; color: var(--orange); }
.event-info-text h4 { font-size: 14px; font-weight: 600; }
.event-info-text p { font-size: 12px; color: var(--text-secondary); }

.section-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 12px;
  margin-top: 24px;
}

/* Description */
.event-description {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-secondary);
  margin-top: 20px;
}

/* Ticket Tiers */
.ticket-tiers { display: flex; flex-direction: column; gap: 10px; }
.ticket-tier {
  padding: 14px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition: all 0.2s;
}
.ticket-tier:hover { border-color: var(--border-light); }
.ticket-tier.selected { border-color: var(--orange); background: rgba(255, 107, 53, 0.06); }
.ticket-tier-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.ticket-tier-name { font-family: var(--font-display); font-weight: 700; font-size: 15px; }
.ticket-tier-price { font-weight: 700; font-size: 18px; color: var(--orange); }
.ticket-tier-perks { display: flex; flex-wrap: wrap; gap: 6px; }
.ticket-perk {
  padding: 3px 8px;
  border-radius: var(--radius-full);
  background: var(--surface-alt);
  font-size: 11px;
  color: var(--text-secondary);
}
.ticket-tier-remaining { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

/* Artist Lineup */
.artist-lineup { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 4px; }
.artist-mini {
  flex-shrink: 0;
  text-align: center;
  width: 72px;
}
.artist-mini-avatar {
  width: 56px; height: 56px;
  border-radius: var(--radius-full);
  margin: 0 auto 6px;
  border: 2px solid var(--border);
}
.artist-mini-name { font-size: 11px; font-weight: 600; line-height: 1.2; }
.artist-mini-type { font-size: 10px; color: var(--text-muted); }

/* Add-ons */
.addons-grid { display: flex; flex-direction: column; gap: 8px; }
.addon-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: var(--surface);
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
}
.addon-img {
  width: 48px; height: 48px;
  border-radius: var(--radius-sm);
  flex-shrink: 0;
}
.addon-info { flex: 1; }
.addon-info h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.addon-info p { font-size: 12px; color: var(--text-secondary); }
.addon-price { font-weight: 700; color: var(--orange); font-size: 14px; }

/* Fixed CTA */
.event-cta-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  padding: 12px 16px calc(12px + var(--safe-bottom));
  background: rgba(15, 15, 19, 0.95);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 50;
}
@media (min-width: 1024px) { .event-cta-bar { max-width: 420px; } }
.event-cta-price .label { font-size: 11px; color: var(--text-muted); }
.event-cta-price .amount { font-family: var(--font-display); font-size: 22px; font-weight: 800; }
.reaction-btn {
  display: flex; align-items: center; gap: 4px; padding: 6px 14px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 20px; cursor: pointer; transition: all 0.2s;
  font-size: 15px;
}
.reaction-btn:active { transform: scale(1.15); }
.reaction-count { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ═══════════════════════════════════════════
   NOTIFICATIONS
   ═══════════════════════════════════════════ */
.notif-panel {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 100%;
  max-width: 360px;
  background: var(--bg-elevated);
  z-index: 200;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}
.notif-panel.open { transform: translateX(0); }
.notif-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 199;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.notif-overlay.open { opacity: 1; pointer-events: all; }
.notif-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
  border-bottom: 1px solid var(--border);
}
.notif-header h2 { font-family: var(--font-display); font-weight: 700; font-size: 18px; }
.notif-list { flex: 1; overflow-y: auto; }
.notif-item {
  display: flex;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid rgba(45,45,58,0.4);
  transition: background 0.2s;
}
.notif-item:hover { background: var(--surface); }
.notif-item.unread { background: rgba(255, 107, 53, 0.04); }
.notif-dot {
  width: 8px; height: 8px;
  border-radius: var(--radius-full);
  background: var(--orange);
  flex-shrink: 0;
  margin-top: 6px;
}
.notif-dot.read { background: transparent; }
.notif-content { flex: 1; }
.notif-content p { font-size: 13px; line-height: 1.4; }
.notif-content p strong { color: var(--text); }
.notif-content .notif-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

/* ═══════════════════════════════════════════
   SEARCH PAGE
   ═══════════════════════════════════════════ */
.search-input-wrap {
  margin: 12px 16px;
  position: relative;
}
.search-input-wrap svg {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  width: 18px; height: 18px;
  color: var(--text-muted);
}
.search-input {
  width: 100%;
  padding: 12px 14px 12px 42px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-full);
  color: var(--text);
  font-size: 15px;
}
.search-input:focus { border-color: var(--orange); }
.search-section { padding: 0 16px; margin-top: 20px; }
.search-section-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 16px;
  margin-bottom: 12px;
}

/* ═══════════════════════════════════════════
   MY TICKETS PAGE
   ═══════════════════════════════════════════ */
.ticket-card {
  margin: 0 16px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.ticket-card-top {
  display: flex;
  gap: 12px;
  padding: 14px;
}
.ticket-card-img {
  width: 64px; height: 64px;
  border-radius: var(--radius-md);
  flex-shrink: 0;
}
.ticket-card-info { flex: 1; }
.ticket-card-info h3 { font-family: var(--font-display); font-weight: 700; font-size: 15px; margin-bottom: 4px; }
.ticket-card-info p { font-size: 12px; color: var(--text-secondary); }
.ticket-card-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--surface-alt);
  border-top: 1px dashed var(--border);
}
.ticket-status {
  padding: 3px 10px;
  border-radius: var(--radius-full);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
}
.ticket-status.active { background: rgba(34, 197, 94, 0.15); color: var(--success); }
.ticket-status.used { background: rgba(107, 114, 128, 0.15); color: var(--text-muted); }
.ticket-qr { font-size: 12px; color: var(--teal); font-weight: 600; }

/* ═══════════════════════════════════════════
   PROFILE PAGE
   ═══════════════════════════════════════════ */
.profile-header {
  text-align: center;
  padding: 24px 16px;
}
.profile-avatar {
  width: 72px; height: 72px;
  border-radius: var(--radius-full);
  margin: 0 auto 12px;
  border: 3px solid var(--orange);
}
.profile-name { font-family: var(--font-display); font-weight: 700; font-size: 20px; }
.profile-email { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
.profile-menu { padding: 0 16px; }
.profile-menu-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: opacity 0.2s;
}
.profile-menu-item:hover { opacity: 0.8; }
.profile-menu-icon {
  width: 36px; height: 36px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  background: var(--surface);
}
.profile-menu-icon svg { width: 16px; height: 16px; }
.profile-menu-text { flex: 1; }
.profile-menu-text h4 { font-size: 14px; font-weight: 600; }
.profile-menu-text p { font-size: 12px; color: var(--text-secondary); }
.profile-menu-arrow { color: var(--text-muted); }

/* ═══════════════════════════════════════════
   EMPTY STATE
   ═══════════════════════════════════════════ */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  text-align: center;
}
.empty-state svg { width: 64px; height: 64px; color: var(--text-muted); margin-bottom: 16px; }
.empty-state h3 { font-family: var(--font-display); font-weight: 700; font-size: 18px; margin-bottom: 8px; }
.empty-state p { font-size: 14px; color: var(--text-secondary); max-width: 260px; line-height: 1.5; }

/* ═══════════════════════════════════════════
   UTILITY
   ═══════════════════════════════════════════ */
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
.text-gradient {
  background: linear-gradient(135deg, var(--orange), var(--teal));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ═══════════════════════════════════════════
   TICKET PURCHASE FLOW
   ═══════════════════════════════════════════ */
.purchase-page { padding: var(--top-bar-height) 0 0; }
.purchase-summary {
  margin: 16px;
  padding: 16px;
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
}
.purchase-event-row {
  display: flex; gap: 12px; align-items: center;
  padding-bottom: 12px; margin-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.purchase-event-img { width: 56px; height: 56px; border-radius: var(--radius-md); flex-shrink: 0; }
.purchase-event-info h3 { font-family: var(--font-display); font-weight: 700; font-size: 15px; margin-bottom: 2px; }
.purchase-event-info p { font-size: 12px; color: var(--text-secondary); }
.purchase-tier-select { margin: 16px; }
.purchase-tier-option {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px; margin-bottom: 8px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius-md); cursor: pointer; transition: all 0.2s;
}
.purchase-tier-option.selected { border-color: var(--orange); background: rgba(255,107,53,0.06); }
.purchase-tier-option .tier-left h4 { font-weight: 600; font-size: 14px; }
.purchase-tier-option .tier-left p { font-size: 12px; color: var(--text-secondary); }
.purchase-tier-option .tier-price { font-family: var(--font-display); font-weight: 800; font-size: 18px; color: var(--orange); }
.qty-control {
  display: flex; align-items: center; gap: 16px;
  margin: 16px;
  justify-content: center;
}
.qty-btn {
  width: 40px; height: 40px;
  border-radius: var(--radius-full);
  background: var(--surface);
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 600;
  transition: all 0.2s;
}
.qty-btn:hover { border-color: var(--orange); color: var(--orange); }
.qty-display {
  font-family: var(--font-display);
  font-size: 28px; font-weight: 800;
  min-width: 40px; text-align: center;
}
.purchase-addons { margin: 16px; }
.purchase-addon-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px; margin-bottom: 8px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius-md); cursor: pointer; transition: all 0.2s;
}
.purchase-addon-item.selected { border-color: var(--teal); background: rgba(20,184,166,0.06); }
.purchase-addon-check {
  width: 22px; height: 22px; border-radius: 6px;
  border: 2px solid var(--border); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.purchase-addon-item.selected .purchase-addon-check { background: var(--teal); border-color: var(--teal); }
.purchase-total {
  margin: 16px; padding: 16px;
  background: var(--surface); border-radius: var(--radius-lg);
  border: 1px solid var(--border);
}
.purchase-total-row {
  display: flex; justify-content: space-between;
  padding: 6px 0; font-size: 14px; color: var(--text-secondary);
}
.purchase-total-row.total {
  border-top: 1px solid var(--border); margin-top: 8px; padding-top: 12px;
  font-family: var(--font-display); font-weight: 700; font-size: 18px; color: var(--text);
}
.purchase-cta { padding: 0 16px 32px; }

/* ═══════════════════════════════════════════
   TICKET CONFIRMATION
   ═══════════════════════════════════════════ */
.confirm-page {
  min-height: 100dvh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 24px; text-align: center;
}
.confirm-check {
  width: 72px; height: 72px; border-radius: var(--radius-full);
  background: rgba(34,197,94,0.15); display: flex;
  align-items: center; justify-content: center; margin-bottom: 20px;
  animation: popIn 0.4s cubic-bezier(0.16,1,0.3,1);
}
@keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
.confirm-check svg { width: 36px; height: 36px; color: var(--success); }
.confirm-title { font-family: var(--font-display); font-size: 24px; font-weight: 800; margin-bottom: 8px; }
.confirm-sub { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
.qr-placeholder {
  width: 180px; height: 180px; margin: 0 auto 16px;
  background: white; border-radius: var(--radius-lg);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
}
.qr-grid {
  width: 100%; height: 100%;
  display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: repeat(7, 1fr); gap: 2px;
}
.qr-cell { border-radius: 1px; }
.qr-cell.dark { background: #000; }
.qr-cell.light { background: #fff; }
.confirm-code { font-family: monospace; font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; letter-spacing: 1px; }
.confirm-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; }

/* ═══════════════════════════════════════════
   EVENT CREATION WIZARD
   ═══════════════════════════════════════════ */
.wizard-page { padding: var(--top-bar-height) 0 0; }
.wizard-progress {
  display: flex; align-items: center; gap: 4px;
  padding: 12px 16px; margin-bottom: 4px;
}
.wizard-step-dot {
  flex: 1; height: 4px; border-radius: 2px;
  background: var(--border); transition: background 0.3s;
}
.wizard-step-dot.active { background: var(--orange); }
.wizard-step-dot.done { background: var(--teal); }
.wizard-step-label {
  padding: 0 16px 4px; font-size: 12px;
  color: var(--text-muted); font-weight: 500;
}
.wizard-body { padding: 8px 16px 100px; }
.wizard-body h2 {
  font-family: var(--font-display); font-weight: 700;
  font-size: 22px; margin-bottom: 4px;
}
.wizard-body .wizard-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
.wizard-cta-bar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  padding: 12px 16px calc(12px + var(--safe-bottom));
  background: rgba(15,15,19,0.95); backdrop-filter: blur(16px);
  border-top: 1px solid var(--border); display: flex; gap: 10px; z-index: 50;
}
@media (min-width: 1024px) { .wizard-cta-bar { max-width: 420px; } }
.wizard-cta-bar .btn { flex: 1; }
.img-upload-area {
  width: 100%; height: 140px; border: 2px dashed var(--border);
  border-radius: var(--radius-lg); display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
  color: var(--text-muted); font-size: 13px; cursor: pointer;
  transition: border-color 0.2s; margin-bottom: 16px;
}
.img-upload-area:hover { border-color: var(--orange); }
.img-upload-area svg { width: 28px; height: 28px; }
.category-select {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
  margin-bottom: 16px;
}
.category-option {
  padding: 10px 8px; border-radius: var(--radius-md);
  background: var(--surface); border: 1.5px solid var(--border);
  text-align: center; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
}
.category-option.selected { border-color: var(--orange); background: rgba(255,107,53,0.08); color: var(--orange); }

/* Ticket tier builder */
.tier-builder { display: flex; flex-direction: column; gap: 10px; }
.tier-built {
  padding: 14px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius-lg);
  display: flex; justify-content: space-between; align-items: center;
}
.tier-built-info h4 { font-weight: 600; font-size: 14px; }
.tier-built-info p { font-size: 12px; color: var(--text-secondary); }
.tier-built-price { font-family: var(--font-display); font-weight: 800; color: var(--orange); }
.tier-built-remove {
  width: 28px; height: 28px; border-radius: var(--radius-full);
  background: rgba(239,68,68,0.12); display: flex;
  align-items: center; justify-content: center; margin-left: 8px;
}
.tier-built-remove svg { width: 14px; height: 14px; color: var(--error); }
.add-tier-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 12px; border: 2px dashed var(--border); border-radius: var(--radius-lg);
  color: var(--text-muted); font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
}
.add-tier-btn:hover { border-color: var(--orange); color: var(--orange); }

/* Venue select in wizard */
.venue-option-cards { display: flex; flex-direction: column; gap: 10px; }
.venue-choice-card {
  display: flex; align-items: center; gap: 14px;
  padding: 16px; background: var(--surface);
  border: 1.5px solid var(--border); border-radius: var(--radius-lg);
  cursor: pointer; transition: all 0.2s;
}
.venue-choice-card.selected { border-color: var(--orange); background: rgba(255,107,53,0.06); }
.venue-choice-icon {
  width: 44px; height: 44px; border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.venue-choice-icon svg { width: 20px; height: 20px; }

/* ═══════════════════════════════════════════
   ORGANIZER DASHBOARD
   ═══════════════════════════════════════════ */
.dashboard-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  padding: 16px;
}
.stat-card {
  padding: 14px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius-lg);
}
.stat-card .stat-value {
  font-family: var(--font-display); font-weight: 800;
  font-size: 24px; margin-bottom: 2px;
}
.stat-card .stat-label { font-size: 12px; color: var(--text-secondary); }
.dashboard-events { padding: 0 16px; }
.dashboard-event-item {
  display: flex; gap: 12px; align-items: center;
  padding: 12px; margin-bottom: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); cursor: pointer; transition: all 0.2s;
}
.dashboard-event-item:hover { border-color: var(--border-light); }
.dashboard-event-img { width: 56px; height: 56px; border-radius: var(--radius-md); flex-shrink: 0; }
.dashboard-event-info { flex: 1; min-width: 0; }
.dashboard-event-info h4 { font-weight: 600; font-size: 14px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dashboard-event-info p { font-size: 12px; color: var(--text-secondary); }
.dashboard-event-sales { text-align: right; flex-shrink: 0; }
.dashboard-event-sales .revenue { font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--success); }
.dashboard-event-sales .sold { font-size: 11px; color: var(--text-muted); }
.dashboard-fab {
  position: fixed; bottom: calc(var(--nav-height) + var(--safe-bottom) + 16px);
  right: calc(50% - 200px);
  width: 52px; height: 52px; border-radius: var(--radius-full);
  background: linear-gradient(135deg, var(--orange), var(--orange-dark));
  box-shadow: var(--shadow-glow);
  display: flex; align-items: center; justify-content: center;
  z-index: 50; transition: transform 0.2s;
}
@media (min-width: 480px) { .dashboard-fab { right: calc(50% - 200px); } }
@media (max-width: 479px) { .dashboard-fab { right: 20px; } }
.dashboard-fab:hover { transform: scale(1.08); }
.dashboard-fab svg { width: 24px; height: 24px; }

/* ═══════════════════════════════════════════
   CHECK-IN SCREEN
   ═══════════════════════════════════════════ */
.checkin-header {
  padding: 16px; background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.checkin-header h2 { font-family: var(--font-display); font-weight: 700; font-size: 18px; }
.checkin-header p { font-size: 13px; color: var(--text-secondary); }
.checkin-stats {
  display: flex; gap: 16px; margin-top: 10px;
}
.checkin-stat { font-size: 13px; }
.checkin-stat strong { color: var(--teal); font-weight: 700; }
.checkin-search { padding: 12px 16px; }
.attendee-list { padding: 0 16px; }
.attendee-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.attendee-avatar {
  width: 40px; height: 40px; border-radius: var(--radius-full); flex-shrink: 0;
}
.attendee-info { flex: 1; }
.attendee-info h4 { font-size: 14px; font-weight: 600; }
.attendee-info p { font-size: 12px; color: var(--text-secondary); }
.checkin-toggle {
  width: 50px; height: 28px; border-radius: 14px;
  background: var(--border); position: relative;
  cursor: pointer; transition: background 0.3s; flex-shrink: 0;
}
.checkin-toggle.checked { background: var(--success); }
.checkin-toggle::after {
  content: ''; position: absolute;
  top: 3px; left: 3px;
  width: 22px; height: 22px; border-radius: var(--radius-full);
  background: white; transition: transform 0.3s;
}
.checkin-toggle.checked::after { transform: translateX(22px); }

/* ═══════════════════════════════════════════
   VENUE MARKETPLACE
   ═══════════════════════════════════════════ */
.venue-filters { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.venue-filter-row { display: flex; gap: 8px; }
.venue-filter-tag {
  flex: 1; padding: 10px 8px; border-radius: var(--radius-md);
  background: var(--surface); border: 1.5px solid var(--border);
  text-align: center; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
}

/* Venue extras */

}

}

/* ═══════════════════════════════════════════ */
/* Messaging */
/* ═══════════════════════════════════════════ */
.convo-list { padding: 0 16px; padding-bottom: 100px; }
.convo-item {
  display: flex; gap: 12px; align-items: center; padding: 14px 0;
  border-bottom: 1px solid var(--border); cursor: pointer;
}

.chat-container { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

/* ═══════════════════════════════════════════ */

/* ═══════════════════════════════════════════ */
/* Live Stream */
/* ═══════════════════════════════════════════ */

.live-badge {

}
.live-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: white; animation: livePulse 1.5s ease infinite; }

.live-viewer-count { font-size: 13px; color: rgba(255,255,255,0.8); display: flex; align-items: center; gap: 4px; }
.live-viewer-count svg { width: 14px; height: 14px; }
.live-close-btn { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.15); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.live-close-btn svg { width: 18px; height: 18px; color: white; }
.live-bottom-bar {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;

}
.live-controls { display: flex; justify-content: center; gap: 16px; margin-bottom: 16px; }
.live-control-btn {
  width: 48px; height: 48px; border-radius: 50%; border: none; display: flex;
  align-items: center; justify-content: center; cursor: pointer;
  background: rgba(255,255,255,0.15); backdrop-filter: blur(4px);
}
.live-control-btn svg { width: 22px; height: 22px; color: white; }
.live-control-btn.end-stream { background: #ef4444; width: 56px; height: 56px; }
.live-control-btn.end-stream svg { width: 24px; height: 24px; }
.live-go-btn {
  width: 100%; padding: 14px; border-radius: var(--radius-lg); border: none;
  background: #ef4444; color: white; font-family: var(--font-display); font-weight: 700;
  font-size: 16px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
}

/* Live Stream Viewer */
.live-chat-overlay {
  position: absolute; bottom: 80px; left: 0; right: 0; max-height: 200px;
  overflow-y: auto; padding: 0 16px; display: flex; flex-direction: column; gap: 4px;
}
.live-chat-msg {
  background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); padding: 6px 10px;
  border-radius: 12px; font-size: 13px; align-self: flex-start; max-width: 85%;
}
.live-chat-msg .chat-user { color: var(--orange); font-weight: 600; margin-right: 6px; font-size: 12px; }
.live-tip-bar {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
  display: flex; gap: 8px; padding: 12px 16px; align-items: center;
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}
.live-tip-input {
  flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 24px; padding: 10px 16px; color: white; font-size: 14px; outline: none;
}
.live-tip-input::placeholder { color: rgba(255,255,255,0.4); }
.live-tip-btn {
  padding: 10px 16px; border-radius: 24px; border: none; background: var(--teal);
  color: white; font-weight: 700; font-size: 13px; cursor: pointer; white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
}
.live-tip-btn svg { width: 14px; height: 14px; }
.live-tip-amounts { display: flex; gap: 6px; }
.live-tip-chip {
  padding: 6px 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.1); color: white; font-size: 12px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
}
.live-tip-chip.selected { background: var(--teal); border-color: var(--teal); }

/* V2: Stripe Connect */
/* ═══════════════════════════════════════════ */
.stripe-page { padding: 16px; padding-bottom: 100px; }
.stripe-hero {
  text-align: center; padding: 32px 16px; margin-bottom: 20px;
  background: linear-gradient(135deg, rgba(99,91,255,0.15), rgba(99,91,255,0.05));
  border: 1px solid rgba(99,91,255,0.2); border-radius: var(--radius-lg);
}
.stripe-hero-icon {
  width: 64px; height: 64px; margin: 0 auto 16px; border-radius: 16px;
  background: linear-gradient(135deg, #635BFF, #8B83FF); display: flex;
  align-items: center; justify-content: center;
}
.stripe-hero-icon svg { width: 32px; height: 32px; color: white; }
.stripe-hero h2 { font-family: var(--font-display); font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.stripe-hero p { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.stripe-steps { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
.stripe-step {
  display: flex; gap: 12px; align-items: center; padding: 14px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
  transition: all 0.3s;
}
.stripe-step.active { border-color: #635BFF; background: rgba(99,91,255,0.08); }
.stripe-step.completed { border-color: var(--teal); }
.stripe-step-num {
  width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; flex-shrink: 0;
  background: var(--border); color: var(--text-secondary);
}
.stripe-step.active .stripe-step-num { background: #635BFF; color: white; }
.stripe-step.completed .stripe-step-num { background: var(--teal); color: white; }
.stripe-step-content h4 { font-size: 14px; font-weight: 600; }
.stripe-step-content p { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.stripe-status-badge {
  display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
  border-radius: 12px; font-size: 11px; font-weight: 700;
}
.stripe-status-badge.connected { background: rgba(20,184,166,0.15); color: var(--teal); }
.stripe-status-badge.pending { background: rgba(255,107,53,0.15); color: var(--orange); }
.stripe-connected-card {
  text-align: center; padding: 24px 16px; background: rgba(20,184,166,0.08);
  border: 1px solid rgba(20,184,166,0.2); border-radius: var(--radius-lg); margin-bottom: 16px;
}
.stripe-connected-check {
  width: 48px; height: 48px; border-radius: 50%; background: var(--teal);
  display: flex; align-items: center; justify-content: center; margin: 0 auto 12px;
}
.stripe-connected-check svg { width: 24px; height: 24px; color: white; }
.stripe-warning-banner {
  display: flex; align-items: center; gap: 10px; padding: 12px;
  background: rgba(255,107,53,0.1); border: 1px solid rgba(255,107,53,0.2);
  border-radius: var(--radius-md); margin-bottom: 16px; cursor: pointer;
}
.stripe-warning-banner svg { width: 18px; height: 18px; color: var(--orange); flex-shrink: 0; }
.stripe-warning-banner span { font-size: 13px; color: var(--orange); font-weight: 500; }

/* V2: Onboarding */
.onboarding-page { height: 100vh; height: 100dvh; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
.onboarding-slides { flex: 1; position: relative; overflow: hidden; }
.onboarding-slide {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 40px 32px; text-align: center;
  transition: transform 0.4s ease, opacity 0.4s ease; opacity: 0; transform: translateX(100%);
}
.onboarding-slide.active { opacity: 1; transform: translateX(0); }
.onboarding-slide.prev { opacity: 0; transform: translateX(-100%); }
.onboarding-slide-icon {
  width: 120px; height: 120px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; margin-bottom: 32px;
}
.onboarding-slide-icon svg { width: 56px; height: 56px; color: white; }
.onboarding-slide h2 { font-family: var(--font-display); font-size: 26px; font-weight: 800; margin-bottom: 12px; }
.onboarding-slide p { font-size: 15px; color: var(--text-secondary); line-height: 1.6; max-width: 300px; }
.onboarding-bottom { padding: 20px 24px 40px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
.onboarding-dots { display: flex; gap: 8px; }
.onboarding-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: all 0.3s; }
.onboarding-dot.active { background: var(--orange); width: 24px; border-radius: 4px; }
.onboarding-skip { font-size: 13px; color: var(--text-secondary); background: none; border: none; cursor: pointer; }

/* V2: Elevated Check-In */
.checkin-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
.checkin-tab {
  flex: 1; padding: 12px 0; text-align: center; font-size: 13px; font-weight: 600;
  color: var(--text-secondary); background: none; border: none; cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.checkin-tab.active { color: var(--orange); border-bottom-color: var(--orange); }
.checkin-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; padding: 0 16px; }
.checkin-stat-card {

.checkin-stat-card .num { font-family: var(--font-display); font-size: 24px; font-weight: 800; }
.checkin-stat-card .lbl { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.checkin-progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin: 8px 0 4px; overflow: hidden; }
.checkin-progress-fill { height: 100%; background: var(--teal); border-radius: 3px; transition: width 0.4s ease; }
.checkin-tier-breakdown { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.checkin-tier-pill {

}
.checkin-tier-dot { width: 8px; height: 8px; border-radius: 50%; }
.scanner-area {
  position: relative; width: 100%; aspect-ratio: 1; max-width: 280px; margin: 24px auto;

  background: rgba(255,107,53,0.03);
}
.scanner-corners { position: absolute; inset: 0; }
.scanner-corners::before, .scanner-corners::after {
  content: ''; position: absolute; width: 24px; height: 24px; border-color: var(--orange); border-style: solid;
}
.scanner-corners::before { top: -1px; left: -1px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
.scanner-corners::after { top: -1px; right: -1px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
.scanner-corners-bottom { position: absolute; inset: 0; }
.scanner-corners-bottom::before, .scanner-corners-bottom::after {
  content: ''; position: absolute; width: 24px; height: 24px; border-color: var(--orange); border-style: solid;
}
.scanner-corners-bottom::before { bottom: -1px; left: -1px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
.scanner-corners-bottom::after { bottom: -1px; right: -1px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
.scan-line {
  position: absolute; left: 8px; right: 8px; height: 2px; background: var(--orange);
  box-shadow: 0 0 8px rgba(255,107,53,0.5); animation: scanMove 2.5s ease-in-out infinite;
}
@keyframes scanMove { 0%, 100% { top: 15%; } 50% { top: 85%; } }
.scan-result-modal {
  position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
}

  background: var(--surface); border: 1px solid var(--border);
}

.scan-result-icon svg { width: 28px; height: 28px; }

.scan-result-icon.invalid { background: rgba(239,68,68,0.15); }
.scan-result-icon.invalid svg { color: #ef4444; }
.scan-result-icon.used { background: rgba(255,107,53,0.15); }
.scan-result-icon.used svg { color: var(--orange); }
.checkin-log-entry {

  border-bottom: 1px solid var(--border); font-size: 13px;
}

.checkin-log-method {
  font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 2px 6px;
  border-radius: 4px; letter-spacing: 0.5px;
}
.checkin-log-method.scan { background: rgba(20,184,166,0.15); color: var(--teal); }
.checkin-log-method.manual { background: rgba(255,107,53,0.15); color: var(--orange); }
.bulk-select-bar {
  position: fixed; bottom: 80px; left: 16px; right: 16px; padding: 12px 16px;
  background: var(--orange); border-radius: var(--radius-lg); display: flex;
  justify-content: space-between; align-items: center; z-index: 50;
  box-shadow: 0 4px 20px rgba(255,107,53,0.3);

.bulk-select-bar span { color: white; font-weight: 600; font-size: 14px; }
.bulk-select-bar button { background: white; color: var(--orange); border: none; padding: 8px 16px; border-radius: var(--radius-md); font-weight: 700; font-size: 13px; cursor: pointer; }
.attendee-checkbox {
  width: 20px; height: 20px; border-radius: 4px; border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
  position: relative;
}

.vip-badge { font-size: 9px; font-weight: 700; text-transform: uppercase; padding: 2px 5px; border-radius: 3px; letter-spacing: 0.5px; }
.vip-badge.vip { background: rgba(255,107,53,0.15); color: var(--orange); }
.vip-badge.vvip { background: rgba(20,184,166,0.15); color: var(--teal); }
.vip-badge.ga { background: rgba(107,114,128,0.15); color: var(--text-secondary); }

.tier-badge.vvip { background: rgba(20,184,166,0.15); color: var(--teal); }
.tier-badge.vip { background: rgba(255,107,53,0.15); color: var(--orange); }
.tier-badge.ga { background: rgba(107,114,128,0.15); color: var(--text-secondary); }
.checkin-stat-value { font-family: var(--font-display); font-size: 22px; font-weight: 800; }
.checkin-stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.checkin-method-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; letter-spacing: 0.5px; }
.checkin-method-badge.scan { background: rgba(20,184,166,0.15); color: var(--teal); }
.checkin-method-badge.manual { background: rgba(255,107,53,0.15); color: var(--orange); }
.checkin-search { padding: 0 16px 8px; }
.checkin-log-info { flex: 1; }
.checkin-log-info h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }

function loadState() {
  try {
    const saved = localStorage.getItem('pullupp_state');
    if (saved) {
      const parsed = JSON.parse(saved);
      state.isLoggedIn = parsed.isLoggedIn || false;
      state.user = parsed.user || null;
      state.savedEvents = new Set(parsed.savedEvents || []);
      state.followedArtists = new Set(parsed.followedArtists || []);
      state.followedVenues = new Set(parsed.followedVenues || []);
      state.tipHistory = parsed.tipHistory || [];
      if (state.isLoggedIn) {
        state.currentRoute = 'home';
      }
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem('pullupp_state', JSON.stringify({
      isLoggedIn: state.isLoggedIn,
      user: state.user,
      savedEvents: [...state.savedEvents],
      followedArtists: [...state.followedArtists],
      followedVenues: [...state.followedVenues],
      tipHistory: state.tipHistory,
    }));
  } catch(e) {}
}

// ═══════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════
function navigate(route, params = {}) {
  state.currentRoute = route;
  state.routeParams = params;
  state.notifOpen = false;
  window.location.hash = route === 'home' ? '/' : `/${route}${params.id ? '/' + params.id : ''}`;
  render();
  window.scrollTo(0, 0);
}

function handleHash() {
  const hash = window.location.hash.slice(1) || '/';
  const parts = hash.split('/').filter(Boolean);
  if (parts.length === 0) {
    if (state.isLoggedIn) {
      state.currentRoute = 'home';
    } else {
      state.currentRoute = 'splash';
    }
  } else if (parts[0] === 'event' && parts[1]) {
    state.currentRoute = 'event-detail';
    state.routeParams = { id: parts[1] };
  } else if (parts[0] === 'purchase' && parts[1]) {
    state.currentRoute = 'purchase';
    state.routeParams = { id: parts[1] };
  } else if (parts[0] === 'confirmation' && parts[1]) {
    state.currentRoute = 'confirmation';
    state.routeParams = { id: parts[1] };
  } else if (parts[0] === 'checkin' && parts[1]) {
    state.currentRoute = 'checkin';
    state.routeParams = { id: parts[1] };
  } else if (parts[0] === 'venue-detail' && parts[1]) {
    state.currentRoute = 'venue-detail';
    state.routeParams = { id: parts[1] };
  } else if (parts[0] === 'artist-profile' && parts[1]) {
    state.currentRoute = 'artist-profile';
    state.routeParams = { id: parts[1] };
  } else if (parts[0] === 'booking-detail' && parts[1]) {
    state.currentRoute = 'booking-detail';
    state.routeParams = { id: parts[1] };
  } else if (parts[0] === 'chat' && parts[1]) {
    state.currentRoute = 'chat';
    state.routeParams = { id: parts[1] };
  } else {
    state.currentRoute = parts[0];
    state.routeParams = parts[1] ? { id: parts[1] } : {};
  }
  render();
}

window.addEventListener('hashchange', handleHash);

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}
function getMonth(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short' }).toUpperCase();
}
function getDay(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.getDate();
}
function getMinPrice(event) {
  if (!event.ticketTiers.length) return 'Free';
  return '$' + Math.min(...event.ticketTiers.map(t => t.price));
}
function getAvatar(index) {
  const c = AVATAR_COLORS[index % AVATAR_COLORS.length];
  return `background: ${c}`;
}

// RENDER ENGINE
// ═══════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  let html = '';

  switch (state.currentRoute) {
    case 'splash': html = renderSplash(); break;
    case 'login': html = renderLogin(); break;
    case 'register': html = renderRegister(); break;
    case 'home': html = renderHome(); break;
    case 'search': html = renderSearch(); break;
    case 'tickets': html = renderTickets(); break;
    case 'profile': html = renderProfile(); break;
    case 'event-detail': html = renderEventDetail(); break;
    case 'purchase': html = renderPurchase(); break;
    case 'confirmation': html = renderConfirmation(); break;
    case 'create-event': html = renderCreateEvent(); break;
    case 'organizer': html = renderOrganizerDashboard(); break;
    case 'checkin': html = renderCheckin(); break;
    case 'venues': html = renderVenueMarketplace(); break;
    case 'venue-detail': html = renderVenueDetail(); break;
    case 'venue-create': html = renderVenueCreate(); break;
    case 'venue-dashboard': html = renderVenueOwnerDashboard(); break;
    case 'artists': html = renderArtistMarketplace(); break;
    case 'artist-profile': html = renderArtistProfile(); break;
    case 'artist-dashboard': html = renderArtistDashboard(); break;
    case 'bookings': html = renderBookings(); break;
    case 'booking-detail': html = renderBookingDetail(); break;
    case 'messages': html = renderMessages(); break;
    case 'chat': html = renderChat(); break;
    case 'settings': html = renderSettings(); break;
    case 'go-live': html = renderGoLive(); break;
    case 'live-broadcasting': html = renderLiveBroadcasting(); break;
    case 'live-viewer': html = renderLiveViewer(); break;
    case 'stripe-connect': html = renderStripeConnect(); break;
    case 'onboarding': html = renderOnboarding(); break;
    case 'groups': html = renderGroups(); break;
    case 'category-dive': html = renderCategoryDeepDive(); break;
    case 'following': html = renderFollowing(); break;
    case 'tip-history': html = renderTipHistoryPage(); break;
    case 'booking-request': html = renderBookingRequest(); break;
    default: html = renderHome(); break;
  }

  // Add notification overlay & panel
  if (state.isLoggedIn && state.currentRoute !== 'event-detail') {
    html += renderNotifPanel();
  }

  // Add tip modal overlay
  html += renderTipModal();

  app.innerHTML = html;
  attachEventListeners();
}

function renderTickets() {
  const tickets = MOCK.purchasedTickets;
  const getCountdown = (dateStr) => {
    const eventDate = new Date(dateStr);
    const now = new Date();
    const diff = Math.ceil((eventDate - now) / (1000 * 60 * 60 * 24));
    if (diff <= 0) return { text: 'Today!', color: 'var(--error)', live: true };
    if (diff === 1) return { text: 'Tomorrow', color: 'var(--orange)', live: false };
    if (diff <= 7) return { text: `In ${diff} days`, color: 'var(--teal)', live: false };
    return { text: `In ${diff} days`, color: 'var(--text-secondary)', live: false };
  };

  return `
    ${renderTopBar()}
    <div class="page">
      <h2 style="font-family: var(--font-display); font-weight: 700; font-size: 22px; padding: 16px 16px 4px;">My Tickets</h2>

      ${tickets.length > 0 ? tickets.map(t => {
        const event = MOCK.events.find(e => e.id === t.eventId);
        const tier = event ? event.ticketTiers.find(ti => ti.id === t.tierId) : null;

        const cd = getCountdown(event.date);
        return `
          <div style="margin: 0 16px 16px; border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border); cursor: pointer;" onclick="navigate('event-detail', { id: '${event.id}' })">
            <div style="background: ${EVENT_GRADIENTS[event.gradient]}; padding: 20px 16px; position: relative;">
              ${cd.live ? '<div style="position: absolute; top: 12px; right: 12px; display: flex; align-items: center; gap: 4px; background: rgba(239,68,68,0.9); padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 700;"><span style="width: 6px; height: 6px; border-radius: 50%; background: white; animation: pulse 1.5s infinite;"></span> NOW</div>' : ''}
              <div style="font-family: var(--font-display); font-weight: 700; font-size: 18px;">${event.title}</div>
              <div style="font-size: 13px; opacity: 0.85; margin-top: 4px;">${formatDate(event.date)} &middot; ${event.time}</div>
              <div style="font-size: 12px; opacity: 0.7; margin-top: 2px;">${venue ? venue.name : 'TBA'}</div>

            <div style="position: relative; display: flex; align-items: center; margin: 0 -6px;">

let selectedRole = 'guest';

function attachEventListeners() {
  // Role selection
  document.querySelectorAll('.role-card').forEach(card => {
    card.addEventListener('click', () => {
      document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedRole = card.dataset.role;
    });
  });
}

function doLogin() {
  const email = document.getElementById('loginEmail')?.value || 'jordan@email.com';
  const name = email.split('@')[0].replace(/[^a-zA-Z]/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
  state.isLoggedIn = true;
  state.user = { name: name || 'Jordan Rivers', email, role: 'guest' };
  saveState();
  navigate('home');
}

function doRegister() {
  const name = document.getElementById('regName')?.value || 'New User';
  const email = document.getElementById('regEmail')?.value || 'user@email.com';
  state.isLoggedIn = true;
  state.user = { name, email, role: selectedRole, stripeConnected: false, interests: [], onboardingComplete: false, avatar: Math.floor(Math.random() * 6) };
  saveState();
  // Artists and venue owners set up Stripe first, then onboarding
  if (selectedRole === 'artist' || selectedRole === 'venue_owner') {
    navigate('stripe-connect');
  } else {
    navigate('onboarding');
  }
}

function doLogout() {
  state.isLoggedIn = false;
  state.user = null;
  state.savedEvents = new Set();
  localStorage.removeItem('pullupp_state');
  navigate('splash');
}

function toggleInterest(category) {
  if (!state.user) return;
  if (!state.user.interests) state.user.interests = [];
  const idx = state.user.interests.indexOf(category);
  if (idx >= 0) {
    state.user.interests.splice(idx, 1);
  } else {
    state.user.interests.push(category);
  }
  saveState();
  render();
}

function toggleSave(eventId) {
  if (state.savedEvents.has(eventId)) {
    state.savedEvents.delete(eventId);
  } else {
    state.savedEvents.add(eventId);
  }
  saveState();
  render();
}

function reactToEvent(eventId, type) {
  const event = MOCK.events.find(e => e.id === eventId);
  if (event && event.reactions) {
    event.reactions[type] = (event.reactions[type] || 0) + 1;
    render();
  }
}

function toggleFollowVenue(venueId) {

function openTipModal(artistId, context) {
  state.tipModalOpen = true;
  state.tipModalArtist = artistId;
  state.tipModalContext = context || 'profile';
  render();
}

function closeTipModal() {
  state.tipModalOpen = false;
  state.tipModalArtist = null;
  render();
}

function sendTip(amount) {
  const artist = MOCK.artists.find(a => a.id === state.tipModalArtist);
  if (!artist || !amount) return;
  state.tipHistory.push({
    id: 't' + Date.now(),
    artistId: artist.id,
    artistName: artist.name,
    amount: parseFloat(amount),
    context: state.tipModalContext,
    timestamp: new Date().toISOString()
  });
  if (artist.tipTotal !== undefined) artist.tipTotal += parseFloat(amount);
  if (artist.tipCount !== undefined) artist.tipCount++;
  saveState();
  state.tipModalOpen = false;
  state.tipModalArtist = null;
  render();
  setTimeout(() => alert(`$${amount} tip sent to ${artist.name}! Thank you!`), 100);
}

  if (!state.tipModalOpen || !state.tipModalArtist) return '';

function handleSearch(query) {
  const resultsDiv = document.getElementById('searchResults');
  if (!resultsDiv) return;
  if (!query.trim()) {
    // Re-render default search content
    render();
    return;
  }
  const q = query.toLowerCase();
  const matchedEvents = MOCK.events.filter(e =>
    e.title.toLowerCase().includes(q) || e.category.toLowerCase().includes(q)
  );
  const matchedVenues = MOCK.venues.filter(v =>
    v.name.toLowerCase().includes(q) || v.type.toLowerCase().includes(q)
  );
  const matchedArtists = MOCK.artists.filter(a =>
    a.name.toLowerCase().includes(q) || a.genre.toLowerCase().includes(q) || a.type.toLowerCase().includes(q)
  );

  let html = '';
  if (matchedEvents.length) {
    html += `<div class="search-section"><h3 class="search-section-title">Events</h3><div style="display: flex; flex-direction: column; gap: 10px;">`;
    matchedEvents.forEach(event => {
      const venue = MOCK.venues.find(v => v.id === event.venueId);
      html += `
        <div style="display: flex; gap: 12px; align-items: center; padding: 10px; background: var(--surface); border-radius: var(--radius-md); cursor: pointer; border: 1px solid var(--border);" onclick="navigate('event-detail', { id: '${event.id}' })">
          <div style="width: 50px; height: 50px; border-radius: var(--radius-sm); background: ${EVENT_GRADIENTS[event.gradient]}; flex-shrink: 0;"></div>
          <div style="flex: 1; min-width: 0;">
            <div style="font-weight: 600; font-size: 14px;">${event.title}</div>
            <div style="font-size: 12px; color: var(--text-secondary);">${formatDate(event.date)} &middot; ${venue ? venue.name : 'TBA'}</div>
          </div>
          <div style="font-weight: 700; color: var(--orange); font-size: 14px;">${getMinPrice(event)}</div>
        </div>`;
    });
    html += '</div></div>';
  }
  if (matchedVenues.length) {
    html += `<div class="search-section"><h3 class="search-section-title">Venues</h3><div style="display: flex; flex-direction: column; gap: 10px;">`;
    matchedVenues.forEach(v => {
      html += `
        <div style="display: flex; gap: 12px; align-items: center; padding: 10px; background: var(--surface); border-radius: var(--radius-md); border: 1px solid var(--border);">
          <div style="width: 50px; height: 50px; border-radius: var(--radius-sm); background: ${EVENT_GRADIENTS[v.gradient]}; flex-shrink: 0;"></div>
          <div style="flex: 1;">
            <div style="font-weight: 600; font-size: 14px;">${v.name}</div>
            <div style="font-size: 12px; color: var(--text-secondary);">${v.type} &middot; ${v.capacity} capacity</div>
          </div>
        </div>`;
    });
    html += '</div></div>';
  }
  if (matchedArtists.length) {
    html += `<div class="search-section"><h3 class="search-section-title">Artists</h3><div style="display: flex; flex-direction: column; gap: 10px;">`;
    matchedArtists.forEach(a => {
      html += `
        <div style="display: flex; gap: 12px; align-items: center; padding: 10px; background: var(--surface); border-radius: var(--radius-md); border: 1px solid var(--border);">
          <div style="width: 44px; height: 44px; border-radius: var(--radius-full); flex-shrink: 0; ${getAvatar(a.avatar)}"></div>
          <div style="flex: 1;">
            <div style="font-weight: 600; font-size: 14px;">${a.name}</div>
            <div style="font-size: 12px; color: var(--text-secondary);">${a.type} &middot; ${a.genre}</div>
          </div>
        </div>`;
    });
    html += '</div></div>';
  }
  if (!matchedEvents.length && !matchedVenues.length && !matchedArtists.length) {
    html = `<div class="empty-state">${ICONS.search}<h3>No results</h3><p>Try a different search term</p></div>`;
  }
  resultsDiv.innerHTML = html;
}

function renderPurchase() {
  const event = MOCK.events.find(e => e.id === state.routeParams.id);
  if (!event) return renderHome();
  const venue = MOCK.venues.find(v => v.id === event.venueId);
  const ps = state.purchaseState;
  if (!ps.tierId && event.ticketTiers.length) ps.tierId = event.ticketTiers[0].id;
  const selectedTier = event.ticketTiers.find(t => t.id === ps.tierId);
  const ticketTotal = selectedTier ? selectedTier.price * ps.qty : 0;
  const addOnTotal = event.addOns.filter(a => ps.addOns.has(a.id)).reduce((sum, a) => sum + a.price, 0) * ps.qty;
  const serviceFee = Math.round(ticketTotal * 0.05);
  const total = ticketTotal + addOnTotal + serviceFee;

  return `
    <div class="purchase-page">
      ${renderTopBar('Get Tickets', true)}
      <div class="purchase-summary">
        <div class="purchase-event-row">
          <div class="purchase-event-img" style="background: ${EVENT_GRADIENTS[event.gradient]};"></div>
          <div class="purchase-event-info">
            <h3>${event.title}</h3>
            <p>${formatDate(event.date)} &middot; ${event.time}</p>
            <p>${venue ? venue.name : 'TBA'}</p>
          </div>
        </div>
      </div>

      <h3 class="section-title" style="padding: 0 16px; margin-top: 16px;">Select Ticket</h3>
      <div class="purchase-tier-select">
        ${event.ticketTiers.map(tier => `
          <div class="purchase-tier-option ${ps.tierId === tier.id ? 'selected' : ''}" onclick="selectPurchaseTier('${tier.id}')">
            <div class="tier-left">
              <h4>${tier.name}</h4>
              <p>${tier.remaining} remaining</p>
            </div>
            <span class="tier-price">$${tier.price}</span>
          </div>
        `).join('')}
      </div>

      <h3 class="section-title" style="padding: 0 16px;">Quantity</h3>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty(-1)">-</button>
        <span class="qty-display">${ps.qty}</span>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>

      ${event.addOns.length > 0 ? `
        <h3 class="section-title" style="padding: 0 16px;">Add-ons</h3>
        <div class="purchase-addons">
          ${event.addOns.map(addon => `
            <div class="purchase-addon-item ${ps.addOns.has(addon.id) ? 'selected' : ''}" onclick="togglePurchaseAddon('${addon.id}')">
              <div class="purchase-addon-check">
                ${ps.addOns.has(addon.id) ? '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
              </div>
              <div class="addon-img" style="background: ${EVENT_GRADIENTS[addon.gradient]}; width: 40px; height: 40px; border-radius: 8px; flex-shrink: 0;"></div>
              <div style="flex: 1;">
                <div style="font-weight: 600; font-size: 14px;">${addon.name}</div>
                <div style="font-size: 12px; color: var(--text-secondary);">${addon.type === 'merch' ? 'Merchandise' : 'Food & Drink'}</div>
              </div>
              <span style="font-weight: 700; color: var(--teal);">+$${addon.price}</span>
            </div>
          `).join('')}
        </div>
      ` : ''}

      <div class="purchase-total">
        <div class="purchase-total-row">
          <span>${selectedTier ? selectedTier.name : 'Ticket'} x${ps.qty}</span>
          <span>$${ticketTotal}</span>
        </div>
        ${addOnTotal > 0 ? `<div class="purchase-total-row"><span>Add-ons x${ps.qty}</span><span>$${addOnTotal}</span></div>` : ''}
        <div class="purchase-total-row">
          <span>Service fee</span>
          <span>$${serviceFee}</span>
        </div>
        <div class="purchase-total-row total">
          <span>Total</span>
          <span>$${total}</span>
        </div>
      </div>

      <div class="purchase-cta">
        <button class="btn btn-primary btn-full btn-lg" onclick="completePurchase('${event.id}')">
          Pay $${total}
        </button>
      </div>
    </div>
  `;
}

function selectPurchaseTier(tierId) {
  state.purchaseState.tierId = tierId;
  render();
}
function changeQty(delta) {
  state.purchaseState.qty = Math.max(1, Math.min(10, state.purchaseState.qty + delta));
  render();
}
function togglePurchaseAddon(addonId) {
  if (state.purchaseState.addOns.has(addonId)) {
    state.purchaseState.addOns.delete(addonId);
  } else {
    state.purchaseState.addOns.add(addonId);
  }
  render();
}
function completePurchase(eventId) {
  const event = MOCK.events.find(e => e.id === eventId);
  const tier = event.ticketTiers.find(t => t.id === state.purchaseState.tierId);
  const code = 'PULLUPP-' + eventId.toUpperCase() + '-' + Math.random().toString(36).substr(2, 6).toUpperCase();
  MOCK.purchasedTickets.push({
    id: 'pt' + Date.now(),
    eventId: eventId,
    tierId: state.purchaseState.tierId,
    status: 'active',
    qrCode: code,
    purchasedAt: new Date().toISOString().split('T')[0],
  });
  state.purchaseState = { tierId: null, qty: 1, addOns: new Set() };
  navigate('confirmation', { id: eventId, code: code });
}

// ═══════════════════════════════════════════
// CONFIRMATION
// ═══════════════════════════════════════════
function renderConfirmation() {
  const event = MOCK.events.find(e => e.id === state.routeParams.id);
  const lastTicket = MOCK.purchasedTickets[MOCK.purchasedTickets.length - 1];
  const code = lastTicket ? lastTicket.qrCode : 'PULLUPP-XXXX';
  // Generate a deterministic QR-like pattern
  const cells = [];
  for (let i = 0; i < 49; i++) {
    const isCorner = (i < 3 || (i > 3 && i < 7)) && (Math.floor(i/7) < 3) ||
      (i % 7 >= 4 && Math.floor(i/7) < 3) ||
      (Math.floor(i/7) >= 4 && i % 7 < 3);
    cells.push((code.charCodeAt(i % code.length) + i) % 3 !== 0 ? 'dark' : 'light');
  }

  return `
    <div class="page-full confirm-page">
      <div class="confirm-check">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h1 class="confirm-title">You're In!</h1>
      <p class="confirm-sub">${event ? event.title : 'Event'} &middot; ${event ? formatDate(event.date) : ''}</p>
      <div class="qr-placeholder">
        <div class="qr-grid">
          ${cells.map(c => `<div class="qr-cell ${c}"></div>`).join('')}
        </div>
      </div>
      <p class="confirm-code">${code}</p>
      <div class="confirm-actions">
        <button class="btn btn-primary btn-full" onclick="navigate('tickets')">View My Tickets</button>

// EVENT CREATION WIZARD
// ═══════════════════════════════════════════
const WIZARD_STEPS = ['Details', 'Settings', 'Tickets', 'Add-ons', 'Venue', 'Entertainment'];

function renderCreateEvent() {
  const step = state.wizardStep;
  const wd = state.wizardData;
  let stepContent = '';

  switch (step) {
    case 0: stepContent = renderWizardDetails(wd); break;
    case 1: stepContent = renderWizardSettings(wd); break;
    case 2: stepContent = renderWizardTickets(wd); break;
    case 3: stepContent = renderWizardAddons(wd); break;
    case 4: stepContent = renderWizardVenue(wd); break;
    case 5: stepContent = renderWizardArtists(wd); break;
  }

  return `
    <div class="wizard-page">
      ${renderTopBar('Create Event', true)}
      <div class="wizard-progress">
        ${WIZARD_STEPS.map((s, i) => `
          <div class="wizard-step-dot ${i < step ? 'done' : ''} ${i === step ? 'active' : ''}"></div>
        `).join('')}
      </div>
      <div class="wizard-step-label">Step ${step + 1} of ${WIZARD_STEPS.length}: ${WIZARD_STEPS[step]}</div>
      <div class="wizard-body">
        ${stepContent}
      </div>
      <div class="wizard-cta-bar">
        ${step > 0 ? `<button class="btn btn-secondary" onclick="wizardBack()">Back</button>` : ''}
        ${step < WIZARD_STEPS.length - 1
          ? `<button class="btn btn-primary" onclick="wizardNext()">Continue</button>`
          : `<button class="btn btn-primary" onclick="wizardFinish()">Create Event</button>`
        }
      </div>
    </div>
  `;
}

function addPromoCode() {
  const code = document.getElementById('promoCode').value.toUpperCase();
  const discount = document.getElementById('promoDiscount').value;
  const maxUses = document.getElementById('promoMaxUses').value;
  if (code && discount) {
    if (!state.wizardData.promoCodes) state.wizardData.promoCodes = [];
    state.wizardData.promoCodes.push({ code, discount: parseInt(discount), maxUses: parseInt(maxUses) || 50 });
    document.getElementById('promoForm').style.display = 'none';
    render();
  }
}

function toggleWizardArtist(artistId) {

    state.wizardData.selectedArtists.push(artistId);

function wizardNext() { state.wizardStep = Math.min(WIZARD_STEPS.length - 1, state.wizardStep + 1); render(); window.scrollTo(0, 0); }

function wizardFinish() {
  const wd = state.wizardData;
